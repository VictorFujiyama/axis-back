services:
  postgres:
    image: postgres:16-alpine
    container_name: blossom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: blossom
      POSTGRES_USER: blossom
      POSTGRES_PASSWORD: blossom_dev
    ports:
      - '127.0.0.1:5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U blossom']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: blossom-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6381:6379'
    volumes:
      - redis_data:/data
    command: ['redis-server', '--save', '60', '1000', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
